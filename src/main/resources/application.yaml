spring:
  application:
    name: todo-service

  datasource:
    url: jdbc:h2:mem:testdb
#    driver-class-name: org.h2.Driver
#    username: sa
#    password:

  jackson:
    default-property-inclusion: non_null

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties.hibernate.format_sql: true

logging:
  level:
    root: INFO
    io.github.mariatelman: INFO
    org.springframework: WARN
